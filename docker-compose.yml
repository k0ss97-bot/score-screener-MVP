services:
  score-screener:
    build: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data:ro
      - ./runtime:/app/runtime
    command:
      - python
      - -m
      - score_screener
      - --telegram
      - --loop
      - --state-file
      - /app/runtime/screener_state.json
    restart: unless-stopped
